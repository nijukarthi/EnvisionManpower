<div class="card">
    <div class="flex items-baseline-last justify-between">
        <h5>Customers</h5>
        <div class="flex justify-end gap-2">
            <p-button label="Add Customer" icon="pi pi-plus" (onClick)="openCustomerModal()" />
            <p-button label="Clear" icon="pi pi-filter-slash" (onClick)="dt.clear()" />
        </div>
    </div>
    <div #mydiv class="border border-[var(--p-content-border-color)] rounded-lg overflow-hidden">
        <p-table #dt [value]="customerList" [rowHover]="true">
            <ng-template #header>
                <tr>
                    <th>SL NO</th>
                    <th>
                        <div class="flex items-center justify-between">
                            <span>Customer Name</span>
                            <p-columnFilter type="text" field="customerName" display="menu" [showAddButton]="false" />
                        </div>
                    </th>
                    <th>Revenue</th>
                    <th>Actions</th>
                </tr>
            </ng-template>
            <ng-template #body let-customer let-i="rowIndex">
                <tr>
                    <td>{{ i + 1 }}</td>
                    <td>{{ customer.customerName }}</td>
                    <td>{{ customer.revenue }}</td>
                    <td>
                        <p-menu #menu [model]="customerMenuItems" [popup]="true" appendTo="body" />
                        <p-button (onClick)="customerMenu($event, menu, customer)" icon="pi pi-ellipsis-v" rounded text />
                    </td>
                </tr>
            </ng-template>
            <ng-template #emptymessage>
                <tr>
                    <td colspan="100%" style="text-align: center; padding: 1rem 0; background-color: var(--surface-ground)">
                        No Record Found
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>

<p-dialog [header]="selectedCustomer ? 'Edit Customer' : 'Create Customer'" [modal]="true" [(visible)]="customerModal" 
    [style]="{ width: '30rem' }" [draggable]="false" (onHide)="onDialogClose()">
    <form [formGroup]="customerForm" (ngSubmit)="submitCustomerForm()">
        <div class="grid grid-cols-1 gap-2">
            <div class="grid col-span-1 gap-1">
                <label for="customer-name">Customer Name</label>
                <input type="text" pInputText formControlName="customerName" inputId="customer-name" />
            </div>
            @if (selectedCustomer) {
                <div class="grid col-span-1 gap-1">
                    <label for="revenue">Revenue</label>
                    <p-inputNumber type="text"formControlName="revenue" inputId="revenue" [useGrouping]="false" />
                </div>
            }
        </div>
        <div class="flex justify-end mt-3">
            <button pButton pRipple type="submit">
                <span pButtonLabel>{{ selectedCustomer ? 'Update' : 'Submit' }}</span>
            </button>
        </div>
    </form>
</p-dialog>

<p-toast />
